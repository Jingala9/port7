<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AISHA ABBAS | LUXE PORTFOLIO</title>
    
    <!-- Fonts die de stijlen uit je foto's matchen (Playfair = Sleek/Vogue, Pinyon = Finesse) -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Pinyon+Script&family=Cinzel:wght@400;700&family=Montserrat:wght@100;300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --butter: #FDF5E6;
            --cocoa: #3d2b1f;
            --white: #ffffff;
            --font-main: 'Playfair Display', serif; /* De "Vogue" look */
            --font-script: 'Pinyon Script', cursive; /* De "Finesse" look */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--white);
            color: var(--cocoa);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- HERO --- */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url('image_11.png') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--white);
        }

        .hero h1 {
            font-family: var(--font-main);
            font-size: clamp(3rem, 12vw, 8rem);
            text-transform: uppercase;
            letter-spacing: 10px;
            font-weight: 400;
        }

        .hero p {
            font-family: var(--font-script);
            font-size: 2.5rem;
            margin-top: -20px;
        }

        /* --- BRANDS SECTION (DE BUBBLES) --- */
        .brands-section {
            background-color: var(--butter);
            padding: 100px 5%;
            text-align: center;
        }

        .section-title {
            font-family: var(--font-main);
            font-size: 3rem;
            margin-bottom: 60px;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .brands-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .brand-bubble {
            width: 160px;
            height: 160px;
            background: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(61, 43, 31, 0.05);
            transition: transform 0.4s ease;
        }

        .brand-bubble:hover { transform: scale(1.1); }
        .brand-bubble img { width: 100%; height: auto; object-fit: contain; }

        /* --- VIDEO EXAMPLES (IPHONE FRAMES) --- */
        .video-section {
            padding: 100px 5%;
            background: var(--white);
            text-align: center;
        }

        .video-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-top: 50px;
        }

        .iphone-frame {
            width: 280px;
            height: 570px;
            background: #000;
            border: 12px solid #1a1a1a;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        /* De inkeping (notch) bovenin de iPhone */
        .iphone-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 25px;
            background: #1a1a1a;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 10;
        }

        .iphone-frame video, .iphone-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-label {
            margin-top: 20px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--cocoa);
        }

        /* --- CONTACT --- */
        footer {
            background: var(--cocoa);
            color: var(--butter);
            padding: 100px 5%;
            text-align: center;
        }

        .contact-cta {
            font-family: var(--font-script);
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .email-link {
            font-family: var(--font-main);
            font-size: 1.5rem;
            color: var(--butter);
            text-decoration: none;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--butter);
        }

    </style>
</head>
<body>

    <!-- Hero -->
    <section class="hero">
        <h1>Aisha Abbas</h1>
        <p>Creative Visionary</p>
    </section>

    <!-- Brands Section -->
    <section class="brands-section">
        <h2 class="section-title">Brands I’ve worked with</h2>
        <div class="brands-grid">
            <!-- Logo Bubbles -->
            <div class="brand-bubble"><img src="image_13.png" alt="EL&N"></div>
            <div class="brand-bubble"><img src="image_14.png" alt="Gisou"></div>
            <div class="brand-bubble"><img src="image_18.png" alt="Ritz-Carlton"></div>
            <div class="brand-bubble"><img src="image_22.png" alt="Dove"></div>
            <div class="brand-bubble"><img src="image_20.png" alt="Arabica"></div>
            <div class="brand-bubble"><img src="image_15.png" alt="Brand"></div>
            <div class="brand-bubble"><img src="image_19.png" alt="Brand"></div>
        </div>
    </section>

    <!-- Video Showcase -->
    <section class="video-section">
        <h2 class="section-title">Video Examples</h2>
        <div class="video-container">
            <!-- iPhone 1 -->
            <div class="video-item">
                <div class="iphone-frame">
                    <img src="video_placeholder1.png" alt="Skincare Showcase">
                </div>
                <p class="video-label">Product Showcase / Skincare</p>
            </div>
            <!-- iPhone 2 -->
            <div class="video-item">
                <div class="iphone-frame">
                    <img src="video_placeholder2.png" alt="Lifestyle">
                </div>
                <p class="video-label">Day in my life / Lifestyle</p>
            </div>
            <!-- iPhone 3 -->
            <div class="video-item">
                <div class="iphone-frame">
                    <img src="video_placeholder3.png" alt="Unboxing">
                </div>
                <p class="video-label">Product Unboxing / Beauty</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="contact-cta">Let's work together</div>
        <a href="mailto:hello@aishaabbas.com" class="email-link">hello@aishaabbas.com</a>
    </footer>

</body>
</html>
