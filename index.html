<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AISHA ABBAS | LUXE PORTFOLIO</title>
    
    <!-- Fonts: De heilige graal voor high-end design -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,900;1,400&family=Montserrat:wght@100;300;600&display=swap" rel="stylesheet">
    
    <!-- Locomotive Scroll voor die 'vloeiende' Apple-vibe -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/locomotive-scroll@4.1.4/dist/locomotive-scroll.min.css">

    <style>
        :root {
            --butter: #FDF5E6;
            --cream: #FFFDF5;
            --cocoa: #3d2b1f;
            --gold: #C5A059;
            --transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* Custom Cursor voor die extra luxe touch */
        #cursor {
            width: 20px;
            height: 20px;
            background: var(--cocoa);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* We gebruiken onze eigen cursor */
        }

        body {
            background-color: var(--cream);
            color: var(--cocoa);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* --- PRELOADER ANIMATIE --- */
        #loader {
            position: fixed;
            height: 100vh;
            width: 100%;
            background: var(--cocoa);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--butter);
            font-family: 'Cinzel Decorative', serif;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 40px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .nav-logo {
            font-family: 'Cinzel Decorative', serif;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* --- HERO SECTION (EDITORIAL STYLE) --- */
        .hero {
            height: 140vh; /* Extra hoog voor scroll-parallax */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: var(--cream);
        }

        .hero-image-container {
            width: 50%;
            height: 80vh;
            position: relative;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.1);
        }

        .hero-image {
            width: 100%;
            height: 100%;
            background: url('image_11.png') no-repeat center center/cover;
            transform: scale(1.1);
            transition: var(--transition);
        }

        .hero-title {
            position: absolute;
            font-family: 'Playfair Display', serif;
            font-size: 12vw;
            line-height: 0.8;
            z-index: 2;
            text-transform: uppercase;
            font-style: italic;
            pointer-events: none;
        }

        .title-left { top: 20%; left: 10%; color: var(--cocoa); }
        .title-right { bottom: 20%; right: 10%; color: var(--butter); text-shadow: -1px -1px 0 var(--cocoa), 1px -1px 0 var(--cocoa), -1px 1px 0 var(--cocoa), 1px 1px 0 var(--cocoa); }

        /* --- BRANDS SECTION (THE FLOATING BUBBLES) --- */
        .brands-wrapper {
            padding: 200px 0;
            background-color: var(--butter);
            position: relative;
        }

        .brands-header {
            text-align: center;
            margin-bottom: 150px;
        }

        .brands-header h2 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 3.5rem;
            letter-spacing: 10px;
            text-transform: uppercase;
        }

        .brands-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 100px;
            padding: 0 10%;
            perspective: 1000px;
        }

        .brand-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .bubble {
            width: 220px;
            height: 220px;
            background: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
            transition: var(--transition);
            box-shadow: 20px 20px 60px #d9d1b4, -20px -20px 60px #ffffff; /* Neumorphism luxe */
            background: linear-gradient(145deg, #ffffff, #e4ddd0);
        }

        .bubble:hover {
            transform: translateY(-20px) rotateY(10deg);
            box-shadow: 0 40px 80px rgba(61, 43, 31, 0.15);
        }

        .bubble img {
            width: 100%;
            filter: grayscale(100%);
            transition: var(--transition);
            opacity: 0.7;
        }

        .brand-item:hover img {
            filter: grayscale(0%);
            opacity: 1;
            transform: scale(1.1);
        }

        .brand-name {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 0.7rem;
            margin-top: 15px;
            opacity: 0.5;
        }

        /* --- FOOTER / CONTACT --- */
        footer {
            height: 60vh;
            background: var(--cocoa);
            color: var(--butter);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        .footer-link {
            font-family: 'Playfair Display', serif;
            font-size: 5vw;
            text-decoration: none;
            color: inherit;
            position: relative;
        }

        .footer-link::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--butter);
            transition: var(--transition);
        }

        .footer-link:hover::after { width: 100%; }

        /* Verberg scrollbar voor clean look */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body data-scroll-container>

    <div id="cursor"></div>
    
    <div id="loader">
        <h1 id="loader-text">AISHA ABBAS</h1>
    </div>

    <nav>
        <div class="nav-logo">AA</div>
        <div class="nav-menu">EST. 2024 — CREATIVE DIRECTOR</div>
    </nav>

    <main>
        <!-- Hero Section -->
        <section class="hero" data-scroll-section>
            <h1 class="hero-title title-left" data-scroll data-scroll-speed="3">L'Art de</h1>
            <div class="hero-image-container" data-scroll data-scroll-speed="-1">
                <div class="hero-image"></div>
            </div>
            <h1 class="hero-title title-right" data-scroll data-scroll-speed="5">Vision</h1>
        </section>

        <!-- Brands Section -->
        <section class="brands-wrapper" data-scroll-section>
            <div class="brands-header" data-scroll data-scroll-speed="1">
                <h2>Brands I've Worked With</h2>
                <p>Partnerships with Global Icons</p>
            </div>

            <div class="brands-container">
                <!-- Herhaal dit blok voor elk van je 10 logo's -->
                <div class="brand-item" data-scroll data-scroll-speed="2">
                    <div class="bubble"><img src="image_13.png" alt="EL&N"></div>
                    <div class="brand-name">EL&N London</div>
                </div>

                <div class="brand-item" data-scroll data-scroll-speed="1">
                    <div class="bubble"><img src="image_14.png" alt="Gisou"></div>
                    <div class="brand-name">Gisou</div>
                </div>

                <div class="brand-item" data-scroll data-scroll-speed="3">
                    <div class="bubble"><img src="image_18.png" alt="Ritz-Carlton"></div>
                    <div class="brand-name">The Ritz-Carlton</div>
                </div>

                <div class="brand-item" data-scroll data-scroll-speed="1.5">
                    <div class="bubble"><img src="image_22.png" alt="Dove"></div>
                    <div class="brand-name">Dove</div>
                </div>

                <div class="brand-item" data-scroll data-scroll-speed="2.5">
                    <div class="bubble"><img src="image_20.png" alt="Arabica"></div>
                    <div class="brand-name">% Arabica</div>
                </div>

                <!-- Voeg de rest (15, 16, 17, 19, 21) hieronder op dezelfde manier toe -->
            </div>
        </section>

        <section class="spacer" style="height: 50vh;" data-scroll-section></section>

        <footer data-scroll-section>
            <p>Ready for the next chapter?</p>
            <a href="mailto:hello@aishaabbas.com" class="footer-link">Let's Create.</a>
            <div style="font-size: 0.6rem; letter-spacing: 5px; margin-top: 50px;">© 2024 AISHA ABBAS ALL RIGHTS RESERVED</div>
        </footer>
    </main>

    <!-- Scripts voor de High-End ervaring -->
    <script src="https://cdn.jsdelivr.net/npm/locomotive-scroll@4.1.4/dist/locomotive-scroll.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // Custom Cursor
        const cursor = document.querySelector('#cursor');
        document.addEventListener('mousemove', (e) => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.5 });
        });

        // Initialize Smooth Scroll
        const scroll = new LocomotiveScroll({
            el: document.querySelector('[data-scroll-container]'),
            smooth: true,
            multiplier: 0.7
        });

        // Preloader Animation
        window.addEventListener('load', () => {
            gsap.to("#loader-text", { opacity: 0, duration: 1 });
            gsap.to("#loader", { height: 0, duration: 1.5, ease: "expo.inOut", delay: 1 });
        });
    </script>
</body>
</html>
